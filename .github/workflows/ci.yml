# Build + SwiftLint en PR. En `develop` no corremos CI en `push`: el merge ya pasó
# checks en el PR; el push a `develop` dispara solo TestFlight (testflight-develop.yml).
# Push a main/master sigue corriendo CI; TestFlight no va aquí.
# PR develop → main/master: sin jobs (release; `develop` ya pasó CI en su PR hacia develop).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (iOS Simulator)
    if: ${{ github.event_name != 'pull_request' || github.head_ref != 'develop' || (github.base_ref != 'main' && github.base_ref != 'master') }}
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild -scheme pagosApp \
            -project pagosApp.xcodeproj \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            build

  swiftlint:
    name: SwiftLint
    if: ${{ github.event_name != 'pull_request' || github.head_ref != 'develop' || (github.base_ref != 'main' && github.base_ref != 'master') }}
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --reporter github-actions-logging
