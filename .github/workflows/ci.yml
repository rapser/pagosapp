# Build + SwiftLint solo en PRs hacia `develop`.
# `main` / `master`: sin este workflow (merge directo sin checks ni jobs en GitHub Actions).
# Push a `develop` no dispara CI (checks en el PR a develop); TestFlight: testflight-develop.yml.
name: CI

on:
  pull_request:
    branches: [develop]

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Xcode (misma línea que TestFlight / App Store)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: |
          xcodebuild -scheme pagosApp \
            -project pagosApp.xcodeproj \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            build

      - name: Unit tests
        run: |
          xcodebuild -scheme pagosApp \
            -project pagosApp.xcodeproj \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -parallel-testing-enabled NO \
            test

  swiftlint:
    name: SwiftLint
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --reporter github-actions-logging
