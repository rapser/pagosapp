# Build + SwiftLint solo en PRs hacia `develop`.
# `main` / `master`: sin este workflow (merge directo sin checks ni jobs en GitHub Actions).
# Push a `develop` no dispara CI (checks en el PR a develop); TestFlight: testflight-develop.yml.
name: CI

on:
  pull_request:
    branches: [develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild -scheme pagosApp \
            -project pagosApp.xcodeproj \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            build

  swiftlint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --reporter github-actions-logging
