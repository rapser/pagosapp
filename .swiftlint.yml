# SwiftLint — reglas permisivas iniciales; endurecer con el tiempo (phased).
included:
  - pagosApp
excluded:
  - pagosApp.xcodeproj
  - pagosApp/Shared/L10n/L10n.swift
line_length: 200
file_length:
  warning: 550
  error: 900
function_body_length:
  warning: 80
  error: 120
type_body_length:
  warning: 400
  error: 600
identifier_name:
  min_length: 1
type_name:
  max_length: 50
disabled_rules:
  - trailing_whitespace
